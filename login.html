<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - ChaloChale Travel App</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet"
        integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        body {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }
        
        .login-card {
            border: none;
            border-radius: 20px;
            box-shadow: 0 15px 35px rgba(0, 0, 0, 0.2);
            background: rgba(255, 255, 255, 0.95);
            backdrop-filter: blur(10px);
        }
        
        .login-card .card-body {
            padding: 3rem;
        }
        
        .login-card h2 {
            color: #667eea;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 2px;
        }
        
        .login-card .form-control {
            border-radius: 10px;
            padding: 12px 20px;
            border: 2px solid #e0e0e0;
            transition: all 0.3s ease;
        }
        
        .login-card .form-control:focus {
            border-color: #667eea;
            box-shadow: 0 0 0 0.2rem rgba(102, 126, 234, 0.25);
        }
        
        .login-card .form-label {
            font-weight: 600;
            color: #333;
            margin-bottom: 0.5rem;
        }
        
        .login-card .btn-primary {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            border: none;
            border-radius: 10px;
            padding: 12px;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 1px;
            transition: all 0.3s ease;
        }
        
        .login-card .btn-primary:hover {
            transform: translateY(-2px);
            box-shadow: 0 5px 20px rgba(102, 126, 234, 0.4);
        }
        
        .login-card .form-check-input:checked {
            background-color: #667eea;
            border-color: #667eea;
        }
        
        .login-card a {
            color: #667eea;
            font-weight: 600;
            transition: color 0.3s ease;
        }
        
        .login-card a:hover {
            color: #764ba2;
        }
        
        .input-icon {
            position: relative;
        }
        
        .input-icon i {
            position: absolute;
            left: 15px;
            top: 70%;
            transform: translateY(-50%);
            color: #667eea;
        }
        
        .input-icon .form-control {
            padding-left: 45px;
        }
        
        .navbar-brand {
            font-weight: 700;
            font-size: 1.5rem;
        }
        
        .nav-link {
            font-weight: 500;
        }
        
        .nav-link:hover {
            color: #fff !important;
        }
        
        footer {
            background: rgba(0, 0, 0, 0.8) !important;
        }
    </style>
</head>

<body>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"
        integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI"
        crossorigin="anonymous"></script>

    <div class="container">
        
        <div class="row">
            <div class="col-md-12">
                <nav class="navbar navbar-expand-lg bg-dark navbar-dark fixed-top">
                    <div class="container-fluid">
                        <a class="navbar-brand" href="index.html">ChaloChale</a>
                        <button class="navbar-toggler" type="button" data-bs-toggle="offcanvas" data-bs-target="#menu"
                            aria-controls="offcanvasNavbar" aria-label="Toggle navigation">
                            <span class="navbar-toggler-icon"></span>
                        </button>
                        <div class="collapse navbar-collapse" id="menu">
                            <ul class="navbar-nav ms-auto">
                                <li class="nav-item"><a class="nav-link" href="index.html">Home</a></li>
                                <li class="nav-item"><a class="nav-link" href="destinations.html">Destinations</a></li>
                                <li class="nav-item"><a class="nav-link" href="packages.html">Packages</a></li>
                                <li class="nav-item"><a class="nav-link" href="booking.html">Bookings</a></li>
                                <li class="nav-item"><a class="nav-link" href="contact.html">Contact</a></li>
                            </ul>
                            <a href="signup.html" class="btn btn-warning ms-lg-3">Signup</a>
                            <a href="login.html" class="btn btn-primary ms-lg-3 active">Login</a>
                        </div>

                    </div>
                </nav>
            </div>
        </div>
    </div>

    <!-- Login Section -->
    <section class="py-5 mt-5">
        <div class="container">
            <div class="row justify-content-center">
                <div class="col-md-6 col-lg-5">
                    <div class="card login-card">
                        <div class="card-body">
                            <div class="text-center mb-4">
                                <i class="fas fa-plane-departure fa-3x mb-3" style="color: #667eea;"></i>
                                <h2 class="fw-bold">Welcome Back!</h2>
                                <p class="text-muted">Login to your ChaloChale account</p>
                            </div>
                            
                            <form>
                                <div class="mb-3 input-icon">
                                    <label for="email" class="form-label">Email Address</label>
                                    <i class="fas fa-envelope"></i>
                                    <input type="email" class="form-control" id="email" placeholder="Enter your email" required>
                                </div>
                                
                                <div class="mb-3 input-icon">
                                    <label for="password" class="form-label">Password</label>
                                    <i class="fas fa-lock"></i>
                                    <input type="password" class="form-control" id="password" placeholder="Enter your password" required>
                                </div>
                                
                                <div class="mb-3 form-check">
                                    <input type="checkbox" class="form-check-input" id="rememberMe">
                                    <label class="form-check-label" for="rememberMe">Remember me</label>
                                </div>
                                
                                <div class="d-grid gap-2">
                                    <button type="submit" class="btn btn-primary">
                                        <i class="fas fa-sign-in-alt me-2"></i>Login
                                    </button>
                                </div>
                                
                                <div class="text-center mt-3">
                                    <a href="#" class="text-decoration-none">Forgot Password?</a>
                                </div>
                            </form>
                            
                            <hr class="my-4">
                            
                            <div class="text-center">
                                <p class="mb-0">Don't have an account? <a href="signup.html" class="text-decoration-none fw-bold">Sign Up</a></p>
                            </div>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </section>

    <!-- Footer Section -->
    <footer class="bg-dark text-white text-center py-3 mt-5">
        <p class="mb-0">
            &copy; 2026 ChaloChale Travel App | Designed with Bootstrap
        </p>
    </footer>
</body>

</html>
